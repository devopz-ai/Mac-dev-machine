# Mac Dev Machine - Package Tiers
# This file defines what tools are included in each package tier
#
# Usage: ./install.sh --package light|standard|advanced
#
# Users can also create a custom config at config/user-config.yaml
# to exclude specific tools they don't want

# ==============================================================================
# LIGHT PACKAGE - Essential tools for basic development
# Best for: Minimalists, limited disk space, specific needs
# Estimated install time: ~15 minutes
# Disk space: ~5GB
# ==============================================================================
light:
  description: "Essential tools for basic development"
  includes:
    system:
      - homebrew
      - xcode-cli
      - rosetta2  # Apple Silicon only

    terminal:
      - iterm2

    editors:
      - visual-studio-code
      - neovim

    languages:
      - python      # via pyenv
      - nodejs      # via nvm

    git:
      - git
      - gh          # GitHub CLI

    cli_tools:
      - jq
      - bat
      - ripgrep
      - fzf
      - htop

    browsers:
      - google-chrome
      - firefox

# ==============================================================================
# STANDARD PACKAGE - Recommended for most developers
# Best for: Full-stack developers, everyday development
# Estimated install time: ~30 minutes
# Disk space: ~15GB
# ==============================================================================
standard:
  description: "Recommended tools for most developers"
  includes:
    # Everything from Light, plus:
    extends: light

    terminal:
      - iterm2
      - tmux
      - starship
      - oh-my-zsh

    editors:
      - visual-studio-code
      - cursor
      - neovim
      - pycharm-ce

    languages:
      - python
      - nodejs
      - typescript
      - go
      - java
      - rust

    git:
      - git
      - git-lfs
      - gh
      - glab
      - lazygit
      - git-delta

    devops:
      - docker
      - kubectl
      - helm
      - terraform

    cli_tools:
      - jq
      - yq
      - bat
      - eza
      - ripgrep
      - fd
      - fzf
      - zoxide
      - htop
      - tree
      - wget
      - httpie

    browsers:
      - google-chrome
      - firefox
      - brave-browser

    databases:
      - postgresql
      - redis
      - dbeaver-community

    communication:
      - slack
      - discord
      - zoom

    apps:
      - rectangle
      - postman
      - the-unarchiver

# ==============================================================================
# ADVANCED PACKAGE - Everything for power users
# Best for: DevOps engineers, AI/ML developers, full setup
# Estimated install time: ~60 minutes
# Disk space: ~30GB+
# ==============================================================================
advanced:
  description: "Complete setup for power users and DevOps engineers"
  includes:
    # Everything from Standard, plus:
    extends: standard

    terminal:
      - iterm2
      - tmux
      - starship
      - oh-my-zsh
